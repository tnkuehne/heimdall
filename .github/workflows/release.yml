name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Check TypeScript
        run: pnpm install --frozen-lockfile && pnpm run check

      - name: Test Rust
        run: cargo test --manifest-path backend/Cargo.toml

      - name: Build Debian package
        run: ./scripts/build-deb.sh

      - name: Read package version
        id: package
        run: |
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' backend/Cargo.toml | head -n 1)"
          if [ -z "${package_version}" ]; then
            echo "Could not read package version from backend/Cargo.toml" >&2
            exit 1
          fi
          deb_path="build/deb/meeting-recorder_${package_version}_amd64.deb"
          test -f "${deb_path}"
          echo "version=${package_version}" >>"${GITHUB_OUTPUT}"
          echo "tag=v${package_version}" >>"${GITHUB_OUTPUT}"
          echo "deb_path=${deb_path}" >>"${GITHUB_OUTPUT}"

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${tag_version}" != "${{ steps.package.outputs.version }}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${{ steps.package.outputs.version }}" >&2
            exit 1
          fi

      - name: Check whether package version changed
        id: version-change
        if: github.ref == 'refs/heads/main'
        run: |
          changed=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            changed=true
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            previous_version="$(
              git show "${{ github.event.before }}:backend/Cargo.toml" \
                | sed -n 's/^version = "\(.*\)"/\1/p' \
                | head -n 1
            )"
            if [ "${previous_version}" != "${{ steps.package.outputs.version }}" ]; then
              changed=true
            fi
          fi

          echo "changed=${changed}" >>"${GITHUB_OUTPUT}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-recorder-deb
          path: build/deb/*.deb
          if-no-files-found: error

      - name: Create draft GitHub release
        if: github.ref == 'refs/heads/main' && steps.version-change.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.tag }}
          RELEASE_VERSION: ${{ steps.package.outputs.version }}
          DEB_PATH: ${{ steps.package.outputs.deb_path }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists; skipping draft release creation."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            "${DEB_PATH}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "Meeting Recorder ${RELEASE_VERSION}" \
            --notes "Draft release for Meeting Recorder ${RELEASE_VERSION}."

      - name: Upload package to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" build/deb/*.deb --clobber
