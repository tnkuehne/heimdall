name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Check TypeScript
        run: pnpm install --frozen-lockfile && pnpm run check

      - name: Test Rust
        run: cargo test --manifest-path backend/Cargo.toml

      - name: Build Debian package
        run: ./scripts/build-deb.sh

      - name: Check tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' backend/Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${tag_version}" != "${package_version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}" >&2
            exit 1
          fi
          test -f "build/deb/meeting-recorder_${package_version}_amd64.deb"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: meeting-recorder-deb
          path: build/deb/*.deb
          if-no-files-found: error

      - name: Upload package to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" build/deb/*.deb --clobber
